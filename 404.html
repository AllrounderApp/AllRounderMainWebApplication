<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the full path into a query param so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
